version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./Docker/DB/Init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - ebay-network

  api:
    build:
      context: ./ebayBE
    image: nguyenkiem/ebay-api:latest
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - MailSettings__Server=${MailSettings__Server}
      - MailSettings__Port=${MailSettings__Port}
      - MailSettings__SenderName=${MailSettings__SenderName}
      - MailSettings__SenderEmail=${MailSettings__SenderEmail}
      - MailSettings__Password=${MailSettings__Password}
      - ExternalAuthSettings__GoogleClientId=${ExternalAuthSettings__GoogleClientId}
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - HCaptchaSecret__Secret=${HCaptchaSecret__Secret}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - ebay-network

  web:
    build:
      context: ./ebayFE
    image: nguyenkiem/ebay-web:latest
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ebay-network

  nginx-lb:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - ebay-network

networks:
  ebay-network:

# End of file
