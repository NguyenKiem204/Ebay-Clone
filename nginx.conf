worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Định nghĩa cluster cho Frontend Web
    upstream web_cluster {
        server web:80;
    }

    # Định nghĩa cluster cho Backend API
    upstream api_cluster {
        server api:8080;
    }

    server {
        listen 80;
        server_name _;

        # Cấu hình proxy cho các request tới Frontend (React)
        location / {
            proxy_pass http://web_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cấu hình proxy cho các request tới Backend API
        location /api/ {
            proxy_pass http://api_cluster/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Khuyên dùng cho WebSocket/SignalR nếu có
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
